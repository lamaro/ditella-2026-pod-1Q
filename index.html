<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TP Final POD</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #000;
      color: #fff;
      font-family: "Roboto", Arial, Helvetica, sans-serif;
    }

    main {
      width: min(1440px, calc(100% - 48px));
      margin: 0 auto;
      padding: 56px 0 64px;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.4rem, 6vw, 5.8rem);
      line-height: 0.95;
      text-align: center;
      letter-spacing: 0;
      font-weight: 900;
    }

    .subtitle {
      margin: 14px 0 42px;
      color: rgba(255, 255, 255, 0.72);
      font-size: clamp(1rem, 2vw, 1.45rem);
      font-weight: 400;
      text-align: center;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 22px;
    }

    .card {
      position: relative;
      display: block;
      aspect-ratio: 4 / 3;
      overflow: hidden;
      border: 0;
      border-radius: 0;
      background-position: center;
      background-size: cover;
      color: inherit;
      text-decoration: none;
      transition: filter 160ms ease;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.18);
    }

    .card span {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 12px 14px;
      background: rgba(0, 0, 0, 0.72);
      font-size: 1.15rem;
      font-weight: 700;
    }

    .card:hover,
    .card:focus-visible {
      filter: brightness(1.08);
      outline: none;
    }

    .card:nth-last-child(2) {
      grid-column: 2;
    }

    .card:last-child {
      grid-column: 3;
    }

    @media (max-width: 980px) {
      .grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .card:nth-last-child(2),
      .card:last-child {
        grid-column: auto;
      }
    }

    @media (max-width: 560px) {
      main {
        width: min(100% - 24px, 1440px);
        padding: 28px 0;
      }

      .grid {
        grid-template-columns: 1fr;
        gap: 14px;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>TP Final POD</h1>
    <p class="subtitle">Di Tella 2026 1Q</p>
    <section class="grid" aria-label="Proyectos por grupo">
      <a class="card" href="Grupo1/" style="background-image: url('imagenesGrupos/grupo1.png');">
        <span>Grupo 1</span>
      </a>
      <a class="card" href="Grupo2/" style="background-image: url('imagenesGrupos/grupo2.png');">
        <span>Grupo 2</span>
      </a>
      <a class="card" href="Grupo3/" style="background-image: url('imagenesGrupos/grupo3.png');">
        <span>Grupo 3</span>
      </a>
      <a class="card" href="Grupo4/" style="background-image: url('imagenesGrupos/grupo4.png');">
        <span>Grupo 4</span>
      </a>
      <a class="card" href="Grupo5/" style="background-image: url('imagenesGrupos/grupo5.png');">
        <span>Grupo 5</span>
      </a>
      <a class="card" href="Grupo6/" style="background-image: url('imagenesGrupos/grupo6.png');">
        <span>Grupo 6</span>
      </a>
      <a class="card" href="Grupo7/" style="background-image: url('imagenesGrupos/grupo7.png');">
        <span>Grupo 7</span>
      </a>
      <a class="card" href="Grupo9/" style="background-image: url('imagenesGrupos/grupo9.png');">
        <span>Grupo 9</span>
      </a>
      <a class="card" href="Grupo10/" style="background-image: url('imagenesGrupos/grupo10.png');">
        <span>Grupo 10</span>
      </a>
      <a class="card" href="Grupo11/" style="background-image: url('imagenesGrupos/grupo11.png');">
        <span>Grupo 11</span>
      </a>
    </section>
  </main>
</body>
</html>
